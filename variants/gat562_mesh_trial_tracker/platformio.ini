; GAT562 Mesh Trial Tracker PlatformIO configuration file
[env:gat562_mesh_trial_tracker]
extends = nrf52840_base
board = gat562_mesh_trial_tracker
board_check = true
build_flags = ${nrf52840_base.build_flags} -I variants/gat562_mesh_trial_tracker -D GAT562_MESH_TRIAL_TRACKER
  -DGPS_POWER_TOGGLE ; comment this line to disable triple press function on the user button to turn off gps entirely.
  -DRADIOLIB_EXCLUDE_SX128X=1
  -DRADIOLIB_EXCLUDE_SX127X=1
  -DRADIOLIB_EXCLUDE_LR11X0=1
build_src_filter = ${nrf52_base.build_src_filter} +<../variants/gat562_mesh_trial_tracker>
lib_deps = 
  ${nrf52840_base.lib_deps}