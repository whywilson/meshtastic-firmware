name: Build nrf52840 Family Only

on:
  push:
    branches:
      - master
      - gat562
  workflow_dispatch:

jobs:
  setup:
    strategy:
      fail-fast: false
      matrix:
        arch: [nrf52840]
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        uses: actions/checkout@v4
        name: Checkout base
      - id: jsonStep
        run: |
          if [[ "$GITHUB_HEAD_REF" == "" ]]; then
            TARGETS=$(./bin/generate_ci_matrix.py ${{matrix.arch}})
          else  
            TARGETS=$(./bin/generate_ci_matrix.py ${{matrix.arch}} quick)
          fi
          echo "Name: $GITHUB_REF_NAME Base: $GITHUB_BASE_REF Ref: $GITHUB_REF Targets: $TARGETS"
          echo "${{matrix.arch}}=$(jq -cn --argjson environments \"$TARGETS\" '{board: $environments}')" >> $GITHUB_OUTPUT
    outputs:
      nrf52840: ${{ steps.jsonStep.outputs.nrf52840 }}

  build-nrf52:
    strategy:
      fail-fast: false
      matrix:
        board:
          # - seeed_xiao_nrf52840_kit
          - heltec-mesh-node-t114
          - gat562_mesh_trial_tracker
          # - rak4631
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Install PlatformIO
        run: pip install platformio
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-
      - name: Build ${{ matrix.board }}
        run: |
          platformio run -e ${{ matrix.board }}
      - name: Rename firmware files after build
        run: |
          VERSION=$(./bin/buildinfo.py long)
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          if [ -f .pio/build/${{ matrix.board }}/firmware.uf2 ]; then
            mv .pio/build/${{ matrix.board }}/firmware.uf2 .pio/build/${{ matrix.board }}/firmware-${{ matrix.board }}-${VERSION}.${SHORT_SHA}.uf2
          fi
          if [ -f .pio/build/${{ matrix.board }}/firmware.hex ]; then
            mv .pio/build/${{ matrix.board }}/firmware.hex .pio/build/${{ matrix.board }}/firmware-${{ matrix.board }}-${VERSION}.${SHORT_SHA}.hex
          fi
          if [ -f .pio/build/${{ matrix.board }}/firmware.zip ]; then
            mv .pio/build/${{ matrix.board }}/firmware.zip .pio/build/${{ matrix.board }}/firmware-${{ matrix.board }}-${VERSION}.${SHORT_SHA}-ota.zip
          fi
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}-${{ steps.version.outputs.long }}.${{ github.sha }}
          path: |
            .pio/build/${{ matrix.board }}/*.uf2
            .pio/build/${{ matrix.board }}/*.hex
            .pio/build/${{ matrix.board }}/*.zip

  gather-artifacts:
    runs-on: ubuntu-latest
    needs: build-nrf52
    outputs:
      version: ${{ steps.version.outputs.long }}
    steps:
      - name: Download all nrf52 artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./output
          pattern: firmware-nrf52840-*
          merge-multiple: true
      - name: Display structure of downloaded files
        run: ls -lR ./output
      - name: Get release version string
        run: |
          echo "long=$(./bin/buildinfo.py long)" >> $GITHUB_OUTPUT
        id: version
      - name: Zip all nrf52840 firmware
        run: |
          zip -j -9 ./firmware-nrf52840-${{ steps.version.outputs.long }}.${{ github.sha }}.zip ./output/firmware-nrf52840-*
      - name: Upload final nrf52840 zip
        uses: actions/upload-artifact@v4
        with:
          name: firmware-nrf52840
          path: ./firmware-nrf52840-${{ steps.version.outputs.long }}.${{ github.sha }}.zip

  release-artifacts:
    runs-on: ubuntu-latest
    needs:
      - gather-artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Create release
        uses: softprops/action-gh-release@v2
        id: create_release
        with:
          draft: true
          prerelease: true
          name: Meshtastic Firmware ${{ needs.gather-artifacts.outputs.version }} Alpha
          tag_name: v${{ needs.gather-artifacts.outputs.version }}
          body: |
            Autogenerated by github action, developer should edit as required before publishing...

      - name: Download nrf52840 firmware zip
        uses: actions/download-artifact@v4
        with:
          name: firmware-nrf52840
          path: ./output

      - name: Display structure of downloaded files
        run: ls -lR ./output

      - name: Add nrf52840 firmware to GitHub Release
        if: ${{ github.ref_name == 'master' || github.ref_name == 'gat562' }}
        run: |
          gh release upload v${{ needs.gather-artifacts.outputs.version }} ./output/firmware-nrf52840-${{ needs.gather-artifacts.outputs.version }}.${{ github.sha }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
