name: Build nrf52840 Family Only

on:
  push:
    branches:
      - master
      - gat562
  workflow_dispatch:

jobs:
  build-nrf52:
    strategy:
      fail-fast: false
      matrix:
        board:
          # - seeed_xiao_nrf52840_kit
          - heltec-mesh-node-t114
          - gat562_mesh_trial_tracker
          # - rak4631
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Install PlatformIO
        run: pip install platformio
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-
      - name: Build ${{ matrix.board }}
        run: |
          platformio run -e ${{ matrix.board }}
      - name: Rename firmware files after build
        run: |
          if [ -f .pio/build/${{ matrix.board }}/firmware.uf2 ]; then
            mv .pio/build/${{ matrix.board }}/firmware.uf2 .pio/build/${{ matrix.board }}/firmware-nrf52840-${{ matrix.board }}.uf2
          fi
          if [ -f .pio/build/${{ matrix.board }}/firmware.hex ]; then
            mv .pio/build/${{ matrix.board }}/firmware.hex .pio/build/${{ matrix.board }}/firmware-nrf52840-${{ matrix.board }}.hex
          fi
          if [ -f .pio/build/${{ matrix.board }}/firmware.zip ]; then
            mv .pio/build/${{ matrix.board }}/firmware.zip .pio/build/${{ matrix.board }}/firmware-nrf52840-${{ matrix.board }}-ota.zip
          fi
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-nrf52840-${{ matrix.board }}
          path: |
            .pio/build/${{ matrix.board }}/*.uf2
            .pio/build/${{ matrix.board }}/*.hex
            .pio/build/${{ matrix.board }}/*.zip

  gather-artifacts:
    runs-on: ubuntu-latest
    needs: build-nrf52
    steps:
      - name: Download all nrf52 artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./output
          pattern: firmware-nrf52840-*
          merge-multiple: true
      - name: Display structure of downloaded files
        run: ls -lR ./output
      - name: Get release version string
        run: |
          echo "long=$(./bin/buildinfo.py long)" >> $GITHUB_OUTPUT
        id: version
      - name: Zip all nrf52840 firmware
        run: |
          zip -j -9 ./firmware-nrf52840-${{ steps.version.outputs.long }}.${{ github.sha }}.zip ./output/firmware-nrf52840-*
      - name: Upload final nrf52840 zip
        uses: actions/upload-artifact@v4
        with:
          name: firmware-nrf52840
          path: ./firmware-nrf52840-${{ steps.version.outputs.long }}.${{ github.sha }}.zip

  release-artifacts:
    runs-on: ubuntu-latest
    needs:
      - gather-artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Get release version string
        run: |
          echo "long=$(./bin/buildinfo.py long)" >> $GITHUB_OUTPUT
        id: version

      - name: Create release
        uses: softprops/action-gh-release@v2
        id: create_release
        with:
          draft: true
          prerelease: true
          name: Meshtastic Firmware ${{ steps.version.outputs.long }} Alpha
          tag_name: v${{ steps.version.outputs.long }}
          body: |
            Autogenerated by github action, developer should edit as required before publishing...

      - name: Download nrf52840 firmware zip
        uses: actions/download-artifact@v4
        with:
          name: firmware-nrf52840
          path: ./output

      - name: Display structure of downloaded files
        run: ls -lR ./output

      - name: Add nrf52840 firmware to GitHub Release
        if: ${{ github.ref_name == 'master' }}
        run: |
          gh release upload v${{ steps.version.outputs.long }} ./output/firmware-nrf52840-${{ steps.version.outputs.long }}.${{ github.sha }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
